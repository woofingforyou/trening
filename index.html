<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Trening</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0e0e0f;
        --surface: #1a1a1c;
        --surface2: #242426;
        --surface3: #2e2e30;
        --border: rgba(255, 255, 255, 0.08);
        --border2: rgba(255, 255, 255, 0.14);
        --text: #f0ede8;
        --muted: #6b6966;
        --muted2: #4a4845;
        --mon: #e8453c;
        --tue: #3b82f6;
        --wed: #22c55e;
        --thu: #a855f7;
        --fri: #f59e0b;
        --done-bg: rgba(34, 197, 94, 0.12);
        --done-border: rgba(34, 197, 94, 0.4);
        --done-text: #86efac;
        --radius: 14px;
        --font-d: 'Syne', sans-serif;
        --font-m: 'DM Mono', monospace;
      }
      html {
        background: var(--bg);
      }
      body {
        font-family: var(--font-m);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding-bottom: 80px;
        -webkit-tap-highlight-color: transparent;
      }

      /* NAV */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: flex;
      }
      .nav-btn {
        flex: 1;
        padding: 12px 8px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        font-family: var(--font-m);
        font-size: 10px;
        color: var(--muted);
        border: none;
        background: none;
        transition: color 0.15s;
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }
      .nav-btn.active {
        color: var(--text);
      }
      .nav-icon {
        font-size: 18px;
        line-height: 1;
      }

      /* VIEWS */
      .view {
        display: none;
      }
      .view.active {
        display: block;
      }

      /* HEADER */
      .app-header {
        position: sticky;
        top: 0;
        z-index: 90;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        padding: 14px 18px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .app-title {
        font-family: var(--font-d);
        font-size: 17px;
        font-weight: 800;
        letter-spacing: -0.3px;
      }
      .global-pct {
        font-family: var(--font-d);
        font-size: 22px;
        font-weight: 800;
        min-width: 52px;
        text-align: right;
        transition: color 0.3s;
      }
      .reset-btn {
        background: #5a1a18;
        border: 1px solid #8b2e2b;
        color: #f4a09d;
        font-family: var(--font-m);
        font-size: 11px;
        padding: 7px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .reset-btn:active {
        transform: scale(0.95);
        background: #7a2220;
        color: #fff;
      }
      .progress-track {
        height: 3px;
        background: var(--surface2);
        position: sticky;
        top: 57px;
        z-index: 89;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #22c55e, #86efac);
        width: 0%;
        transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        border-radius: 0 2px 2px 0;
      }

      /* TABS */
      .day-tabs {
        display: flex;
        overflow-x: auto;
        scrollbar-width: none;
        padding: 14px 18px 0;
        -webkit-overflow-scrolling: touch;
      }
      .day-tabs::-webkit-scrollbar {
        display: none;
      }
      .day-tab {
        flex-shrink: 0;
        padding: 8px 14px;
        border-radius: 10px 10px 0 0;
        font-family: var(--font-m);
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid var(--border);
        border-bottom: none;
        background: var(--surface);
        color: var(--muted);
        transition: all 0.15s;
        letter-spacing: 0.3px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        min-width: 62px;
        text-align: center;
      }
      .day-tab.active {
        color: var(--text);
        background: var(--surface2);
      }
      .day-tab .tab-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
        transition: background 0.2s;
      }
      .day-tab.active .tab-dot {
        background: currentColor;
      }
      .day-tab[data-day='0'] {
        color: var(--mon);
      }
      .day-tab[data-day='1'] {
        color: var(--tue);
      }
      .day-tab[data-day='2'] {
        color: var(--wed);
      }
      .day-tab[data-day='3'] {
        color: var(--thu);
      }
      .day-tab[data-day='4'] {
        color: var(--fri);
      }
      .tab-pct {
        font-size: 10px;
        opacity: 0.7;
      }
      .day-panel {
        display: none;
        padding: 0 18px 20px;
      }
      .day-panel.active {
        display: block;
      }
      .day-header-bar {
        border: 1px solid var(--border);
        border-top: none;
        border-radius: 0 0 var(--radius) var(--radius);
        background: var(--surface2);
        padding: 14px 16px 12px;
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .day-name {
        font-family: var(--font-d);
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .day-sub {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
        letter-spacing: 0.3px;
      }
      .day-pct-big {
        font-family: var(--font-d);
        font-size: 28px;
        font-weight: 800;
        line-height: 1;
        transition: color 0.3s;
      }
      .day-time {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }

      /* EXERCISE CARDS */
      .ex-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 10px;
        overflow: hidden;
        transition:
          border-color 0.25s,
          background 0.25s;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }
      .ex-card:active {
        transform: scale(0.985);
      }
      .ex-card.done {
        background: var(--done-bg);
        border-color: var(--done-border);
      }
      .ex-main {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
      }
      .ex-check {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        background: var(--surface2);
        font-size: 14px;
      }
      .ex-card.done .ex-check {
        background: #22c55e;
        border-color: #22c55e;
        transform: scale(1.1);
      }
      .ex-info {
        flex: 1;
        min-width: 0;
      }
      .ex-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        line-height: 1.3;
        transition: color 0.2s;
      }
      .ex-card.done .ex-name {
        color: var(--done-text);
      }
      .ex-meta {
        display: flex;
        gap: 8px;
        margin-top: 5px;
        flex-wrap: wrap;
      }
      .tag {
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 4px;
        letter-spacing: 0.3px;
        font-weight: 500;
      }
      .tag-sets {
        background: rgba(255, 255, 255, 0.07);
        color: #93c5fd;
      }
      .tag-rir-easy {
        background: rgba(34, 197, 94, 0.15);
        color: #86efac;
      }
      .tag-rir-mid {
        background: rgba(245, 158, 11, 0.15);
        color: #fcd34d;
      }
      .tag-rir-hard {
        background: rgba(239, 68, 68, 0.18);
        color: #fca5a5;
      }
      .ex-toggle-tip {
        font-size: 10px;
        color: var(--muted);
        padding: 0 16px 10px;
        letter-spacing: 0.2px;
        line-height: 1.5;
        display: none;
      }
      .ex-card.expanded .ex-toggle-tip {
        display: block;
      }
      .ex-card.done .ex-toggle-tip {
        color: rgba(134, 239, 172, 0.6);
      }

      /* ── HISTORY VIEW ── */
      .hist-header {
        padding: 20px 18px 0;
      }
      .hist-title {
        font-family: var(--font-d);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .hist-sub {
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
      }

      .stats-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        padding: 16px 18px 0;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        text-align: center;
      }
      .stat-num {
        font-family: var(--font-d);
        font-size: 26px;
        font-weight: 800;
        line-height: 1;
      }
      .stat-label {
        font-size: 10px;
        color: var(--muted);
        margin-top: 4px;
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }

      /* CALENDAR */
      .cal-section {
        padding: 20px 18px 0;
      }
      .cal-section-title {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }
      .cal-day-label {
        font-size: 9px;
        color: var(--muted2);
        text-align: center;
        padding: 4px 0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .cal-cell {
        aspect-ratio: 1;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: var(--muted);
        background: var(--surface);
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.15s;
        position: relative;
        flex-direction: column;
        gap: 1px;
      }
      .cal-cell.today {
        border-color: var(--border2);
        color: var(--text);
      }
      .cal-cell.has-session {
        cursor: pointer;
      }
      .cal-cell.has-session:active {
        transform: scale(0.93);
      }
      .cal-cell .cal-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
      }
      .cal-cell.empty {
        background: transparent;
        border-color: transparent;
        cursor: default;
      }
      .cal-cell.other-month {
        opacity: 0.3;
      }

      /* SESSION LIST */
      .session-list {
        padding: 16px 18px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .session-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .session-card:active {
        transform: scale(0.98);
      }
      .session-main {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
      }
      .session-date-box {
        width: 42px;
        text-align: center;
        flex-shrink: 0;
      }
      .session-day-num {
        font-family: var(--font-d);
        font-size: 22px;
        font-weight: 800;
        line-height: 1;
      }
      .session-month {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .session-info {
        flex: 1;
      }
      .session-name {
        font-size: 13px;
        font-weight: 500;
      }
      .session-meta {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
      }
      .session-pct {
        font-family: var(--font-d);
        font-size: 20px;
        font-weight: 800;
      }
      .session-detail {
        display: none;
        padding: 0 16px 14px;
        border-top: 1px solid var(--border);
      }
      .session-card.open .session-detail {
        display: block;
      }
      .session-ex-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 10px;
      }
      .session-ex-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
      }
      .session-ex-check {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
        flex-shrink: 0;
      }
      .session-ex-check.done {
        background: #22c55e;
        color: #052e16;
      }
      .session-ex-check.skip {
        background: var(--surface3);
        color: var(--muted);
      }
      .session-ex-name {
        color: var(--muted);
        flex: 1;
      }
      .session-ex-name.done {
        color: var(--done-text);
      }

      .empty-hist {
        padding: 60px 18px;
        text-align: center;
        color: var(--muted);
      }
      .empty-hist-icon {
        font-size: 40px;
        margin-bottom: 12px;
      }
      .empty-hist-text {
        font-size: 13px;
        line-height: 1.6;
      }

      /* DELETE BUTTON */
      .session-delete {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.15s;
      }
      .session-delete:active {
        background: rgba(232, 69, 60, 0.15);
        border-color: rgba(232, 69, 60, 0.4);
        color: #e8453c;
        transform: scale(0.9);
      }

      /* CALENDAR PERCENT WATERMARK */
      .cal-cell {
        position: relative;
        overflow: hidden;
      }
      .cal-num {
        position: relative;
        z-index: 2;
        font-size: 10px;
      }
      .cal-watermark {
        position: absolute;
        bottom: -4px;
        right: -2px;
        font-family: var(--font-d);
        font-weight: 800;
        font-style: italic;
        font-size: 22px;
        line-height: 1;
        opacity: 0.18;
        z-index: 1;
        pointer-events: none;
        letter-spacing: -1px;
      }

      /* OVERLAY */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 200;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        backdrop-filter: blur(4px);
      }
      .overlay.show {
        opacity: 1;
        pointer-events: all;
      }
      .confirm-sheet {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px 20px 0 0;
        padding: 24px 24px 36px;
        width: 100%;
        max-width: 480px;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
      }
      .overlay.show .confirm-sheet {
        transform: translateY(0);
      }
      .confirm-handle {
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 0 auto 20px;
      }
      .confirm-title {
        font-family: var(--font-d);
        font-size: 20px;
        font-weight: 800;
        margin-bottom: 6px;
      }
      .confirm-sub {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .confirm-btns {
        display: flex;
        gap: 10px;
      }
      .btn-cancel {
        flex: 1;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        font-family: var(--font-m);
        font-size: 13px;
        cursor: pointer;
      }
      .btn-cancel:active {
        background: var(--surface2);
      }
      .btn-confirm {
        flex: 1;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: #e8453c;
        color: #fff;
        font-family: var(--font-d);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn-confirm:active {
        transform: scale(0.96);
        background: #c0392b;
      }

      /* RESET BTN – darker red */
      .reset-btn {
        background: #5a1a18 !important;
        border-color: #8b2e2b !important;
        color: #f4a09d !important;
      }
      .reset-btn:active {
        background: #7a2220 !important;
        color: #fff !important;
      }

      /* EDIT BUTTON */
      .edit-btn {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.15s;
        margin-left: 4px;
      }
      .edit-btn:active {
        background: var(--surface3);
        color: var(--text);
        transform: scale(0.9);
      }
      .ex-card.editing .edit-btn {
        background: var(--surface3);
        color: var(--text);
        border-color: var(--border2);
      }

      /* EDIT PANEL */
      .ex-edit-panel {
        display: none;
        padding: 0 14px 14px;
        border-top: 1px solid var(--border);
      }
      .ex-edit-panel.open {
        display: block;
      }
      .edit-field-label {
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 5px;
        margin-top: 12px;
      }
      .edit-input {
        width: 100%;
        background: var(--surface3);
        border: 1px solid var(--border2);
        border-radius: 8px;
        color: var(--text);
        font-family: var(--font-m);
        font-size: 13px;
        padding: 9px 12px;
        outline: none;
        transition: border-color 0.15s;
      }
      .edit-input:focus {
        border-color: rgba(255, 255, 255, 0.3);
      }
      .edit-textarea {
        width: 100%;
        background: var(--surface3);
        border: 1px solid var(--border2);
        border-radius: 8px;
        color: var(--text);
        font-family: var(--font-m);
        font-size: 12px;
        padding: 9px 12px;
        outline: none;
        transition: border-color 0.15s;
        resize: none;
        min-height: 72px;
        line-height: 1.5;
      }
      .edit-textarea:focus {
        border-color: rgba(255, 255, 255, 0.3);
      }
      .edit-actions {
        display: flex;
        gap: 6px;
        margin-top: 10px;
      }
      .edit-cancel {
        flex: 1;
        padding: 9px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: var(--font-m);
        font-size: 11px;
        cursor: pointer;
      }
      .edit-reset {
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: var(--font-m);
        font-size: 11px;
        cursor: pointer;
        white-space: nowrap;
      }
      .edit-save {
        flex: 1;
        padding: 9px;
        border-radius: 8px;
        border: none;
        background: var(--surface3);
        color: var(--text);
        font-family: var(--font-d);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .edit-delete {
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid rgba(232, 69, 60, 0.3);
        background: rgba(232, 69, 60, 0.1);
        color: #f4a09d;
        font-family: var(--font-m);
        font-size: 11px;
        cursor: pointer;
        white-space: nowrap;
      }
      .edit-rir-row {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-top: 2px;
      }
      .rir-opt {
        padding: 6px 10px;
        border-radius: 7px;
        border: 1px solid var(--border);
        background: var(--surface3);
        color: var(--muted);
        font-family: var(--font-m);
        font-size: 10px;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.3px;
      }
      .rir-opt.active {
        border-color: var(--border2);
        color: var(--text);
        background: #2e2e38;
      }
      .add-ex-btn {
        width: 100%;
        padding: 12px;
        border-radius: var(--radius);
        border: 1px dashed var(--border2);
        background: transparent;
        color: var(--muted);
        font-family: var(--font-m);
        font-size: 12px;
        cursor: pointer;
        margin-bottom: 8px;
        transition: all 0.15s;
        letter-spacing: 0.3px;
      }
      .add-ex-btn:active {
        background: var(--surface);
        color: var(--text);
      }
      .reset-day-btn {
        width: 100%;
        padding: 10px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted2);
        font-family: var(--font-m);
        font-size: 10px;
        cursor: pointer;
        margin-bottom: 8px;
        transition: all 0.15s;
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }
      .reset-day-btn:active {
        background: var(--surface2);
        color: var(--muted);
      }
      .edit-save:active {
        opacity: 0.8;
        transform: scale(0.97);
      }

      /* TOAST */
      .toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: #22c55e;
        color: #052e16;
        font-family: var(--font-d);
        font-size: 14px;
        font-weight: 700;
        padding: 12px 22px;
        border-radius: 50px;
        z-index: 300;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        pointer-events: none;
        white-space: nowrap;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <!-- VIEW: TRENING -->
    <div class="view active" id="view-trening">
      <header class="app-header">
        <div><div class="app-title">TRENING</div></div>
        <div style="display: flex; align-items: center; gap: 8px">
          <div class="global-pct" id="globalPct">0%</div>
          <button class="reset-btn" onclick="openReset()">Reset tyg.</button>
        </div>
      </header>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="day-tabs" id="dayTabs"></div>
      <div id="panels"></div>
    </div>

    <!-- VIEW: HISTORIA -->
    <div class="view" id="view-historia">
      <div class="hist-header">
        <div class="hist-title">Historia</div>
        <div class="hist-sub">Zapisane sesje treningowe</div>
      </div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">Sesji</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statStreak">0</div>
          <div class="stat-label">Tyg. z rzędu</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statAvg">0%</div>
          <div class="stat-label">Śr. ukończ.</div>
        </div>
      </div>
      <div class="cal-section">
        <div class="cal-section-title" id="calMonthLabel"></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <div class="session-list" id="sessionList"></div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button
        class="nav-btn active"
        id="nav-trening"
        onclick="switchView('trening')"
      >
        <span class="nav-icon">💪</span>Trening
      </button>
      <button
        class="nav-btn"
        id="nav-historia"
        onclick="switchView('historia')"
      >
        <span class="nav-icon">📅</span>Historia
      </button>
    </nav>

    <!-- Reset overlay -->
    <div class="overlay" id="overlay" onclick="overlayClick(event)">
      <div class="confirm-sheet">
        <div class="confirm-handle"></div>
        <div class="confirm-title">Zapisać i zresetować?</div>
        <div class="confirm-sub">
          Aktualny tydzień zostanie zapisany do historii, a wszystkie ćwiczenia
          odznaczone. Użyj po weekendzie, przed nowym tygodniem.
        </div>
        <div class="confirm-btns">
          <button class="btn-cancel" onclick="closeReset()">Anuluj</button>
          <button class="btn-confirm" onclick="doReset()">
            Zapisz i resetuj ✓
          </button>
        </div>
      </div>
    </div>

    <script>
      const DAYS = [
        {
          name: 'Poniedziałek',
          short: 'Pon',
          sub: 'Klatka + Triceps',
          time: '~65 min',
          color: '#e8453c',
          exercises: [
            {
              name: 'Wyciskanie pod kątem (głowa wyżej)',
              sets: '4 × 8–12',
              rir: 'hard',
              rirLabel: 'do upadku (ost. seria)',
              tip: 'Ławka 30–45°. Łokcie 45° od tułowia. Zacznij tu – górna klatka potrzebuje świeżości. Serie 1–3: 2–3 powt. w zapasie.',
            },
            {
              name: 'Wyciskanie na ławce płaskiej',
              sets: '4 × 8–12',
              rir: 'mid',
              rirLabel: '1 RIR (ost. seria: upadek)',
              tip: 'Łopatki ściągnięte do tyłu i w dół. Łokcie 45° od ciała. Nie blokuj łokci na górze.',
            },
            {
              name: 'Pompki z nogami na ławce',
              sets: '3 × max',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Nogi na ławce, ręce na podłodze. Ciało w linii. Klatka prawie dotyka podłogi.',
            },
            {
              name: 'Wyciskanie z rotacją (zamiennik rozpiątek)',
              sets: '3 × 12',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Start: hantle równolegle. Na górze obracasz – kciuki się spotykają. Ściskasz środek klatki.',
            },
            {
              name: 'Prostowanie triceps znad głowy',
              sets: '3 × 12–15',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Łokcie blisko głowy, nie rozchylaj. Hantel schodzi za głowę – pełen zakres.',
            },
            {
              name: 'Wyciskanie tricepsa z gumą',
              sets: '3 × 15',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Guma pod stopami, łokcie przy ciele. Ostatnie ćwiczenie – daj wszystko.',
            },
          ],
        },
        {
          name: 'Wtorek',
          short: 'Wt',
          sub: 'Plecy + Biceps',
          time: '~70 min',
          color: '#3b82f6',
          exercises: [
            {
              name: 'Podciąganie nachwyt (szeroki chwyt)',
              sets: '4 × max',
              rir: 'mid',
              rirLabel: '1–2 RIR (ost. seria: upadek)',
              tip: 'Nachwyt szerszy niż ramiona. Klatka do drążka. Powolne opuszczanie 3 sek.',
            },
            {
              name: 'Podciąganie podchwyt (wąski chwyt)',
              sets: '3 × max',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Dłonie do ciebie, chwyt węższy. Bardziej angażuje biceps. Łokcie w dół i do tyłu.',
            },
            {
              name: 'Wiosłowanie sztangielką w opadzie',
              sets: '4 × 10–12',
              rir: 'mid',
              rirLabel: '2 RIR (ost. seria: upadek)',
              tip: 'Kolano i dłoń na ławce. Plecy PROSTE, równolegle do podłogi. Łokieć prosto w górę i za siebie.',
            },
            {
              name: 'Ściąganie gumy z drążka',
              sets: '3 × 15',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Guma w drążku. Ściągasz do pasa lub w dół. Łopatki zbliżają się do siebie.',
            },
            {
              name: 'Uginanie biceps stojąco',
              sets: '3 × 12',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Łokcie przy ciele – NIE ruszają się. Pełen zakres. Nie bujaj tułowiem.',
            },
            {
              name: 'Uginanie młotkowe',
              sets: '3 × 12',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Kciuk w górę (neutralny chwyt). Buduje brachialis – dodatkowa grubość ramienia.',
            },
          ],
        },
        {
          name: 'Środa',
          short: 'Śr',
          sub: 'Nogi + Pośladki',
          time: '~75 min',
          color: '#22c55e',
          exercises: [
            {
              name: 'Przysiad goblet ze sztangielką',
              sets: '4 × 12–15',
              rir: 'mid',
              rirLabel: '2 RIR (ost. seria: upadek)',
              tip: 'Hantel pionowo przy klatce. Stopy nieco szerzej, palce na zewnątrz. Zejdź nisko – uda równolegle lub niżej.',
            },
            {
              name: 'Wykroki ze sztangielkami',
              sets: '3 × 10/nogę',
              rir: 'mid',
              rirLabel: '1–2 RIR',
              tip: 'Tułów pionowo. Kolano tylnej nogi prawie dotyka podłogi. Wracasz przez piętę przedniej nogi.',
            },
            {
              name: 'Hip thrust (nogi na ławce)',
              sets: '4 × 15',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Barki na ławce. Biodra w górę – ściskasz pośladki 1 sekundę na górze. Kolana nie do środka.',
            },
            {
              name: 'Martwy ciąg rumuński',
              sets: '3 × 12',
              rir: 'easy',
              rirLabel: '2 RIR (max 1 RIR ost. seria)',
              tip: 'WAŻNE przy lędźwiach: plecy zawsze proste, neutralny kręgosłup. Schodzisz do połowy łydki. Hantle blisko nóg.',
            },
            {
              name: 'Wspięcia na palce (stojąco)',
              sets: '4 × 20',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Pełen zakres: pięta nisko, potem max wspięcie. Powolne opuszczanie 3 sek – tam jest wzrost.',
            },
            {
              name: 'Odwodzenie nóg z gumą',
              sets: '3 × 20',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Guma nad kolanami. Rozkładasz kolana na boki. Biodra i tułów stabilne.',
            },
          ],
        },
        {
          name: 'Czwartek',
          short: 'Czw',
          sub: 'Barki + Górne plecy',
          time: '~65 min',
          color: '#a855f7',
          exercises: [
            {
              name: 'Wyciskanie nad głową (siedząc)',
              sets: '4 × 10–12',
              rir: 'mid',
              rirLabel: '2 RIR (ost. seria: upadek)',
              tip: 'Ławka pionowo. Łokcie lekko PRZED tułowiem – nie rozchylaj na boki. Nie blokuj łokci na górze.',
            },
            {
              name: 'Unoszenie boczne',
              sets: '3 × 12–15',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'LEKKI ciężar. Łokcie delikatnie ugięte. Unosisz do ramion. Kontrolowane opuszczanie. Nie bujaj.',
            },
            {
              name: 'Unoszenie przodem',
              sets: '3 × 12',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Na przemian lub jednocześnie. Do wysokości barków. Kciuk lekko wyżej niż mały palec.',
            },
            {
              name: 'Odwrotne rozpiętki w opadzie',
              sets: '3 × 15',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Tułów równolegle do podłogi. Unosisz hantle na boki. Łopatki zbliżają się w szczycie.',
            },
            {
              name: 'Face pull z gumy (drążek)',
              sets: '3 × 15',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Guma na wysokości twarzy. Ściągasz do twarzy, łokcie wysoko. Kciuki do twarzy. Zdrowie barku.',
            },
            {
              name: 'Rotacja zewnętrzna z gumą',
              sets: '3 × 15',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Łokieć przy boku, 90°. Obracasz przedramię na zewnątrz. Łokieć nieruchomy. Stożek rotatorów.',
            },
          ],
        },
        {
          name: 'Piątek',
          short: 'Pt',
          sub: 'Core + Stabilizacja',
          time: '~55 min',
          color: '#f59e0b',
          exercises: [
            {
              name: 'Prostownik grzbietu (ławka rzymska)',
              sets: '4 × 12–15',
              rir: 'easy',
              rirLabel: '2 RIR (max 1 RIR ost. seria)',
              tip: 'PRIORYTET przy lędźwiach. Mały zakres na start. Neutralny kręgosłup – nie zaokrąglasz. Powolny ruch w dół.',
            },
            {
              name: 'Deska na łokciach (plank)',
              sets: '3 × 30–45 sek',
              rir: 'hard',
              rirLabel: 'do upadku (czasu)',
              tip: 'Łokcie pod barkami. Biodra równo. Brzuch napięty, oddychasz. Jak forma się psuje – kończ.',
            },
            {
              name: 'Deska boczna',
              sets: '3 × 20–30 sek/str',
              rir: 'hard',
              rirLabel: 'do upadku (czasu)',
              tip: 'Jedno przedramię. Biodra w górze – prosta linia od głowy do stóp.',
            },
            {
              name: 'Martwy błąd (dead bug)',
              sets: '3 × 10/stronę',
              rir: 'easy',
              rirLabel: '2 RIR – technika ważna',
              tip: 'Na plecach. Opuszczasz przeciwne ramię i nogę jednocześnie. Lędźwie ZAWSZE przy macie. Powoli.',
            },
            {
              name: 'Wznosy kolan na drążku',
              sets: '3 × 12',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Zwisasz na drążku. Kolana do klatki, powolne opuszczanie. Bez kiwania – napnij brzuch przed ruchem.',
            },
            {
              name: 'Wznosy nóg (leżąc)',
              sets: '3 × 12',
              rir: 'hard',
              rirLabel: 'do upadku',
              tip: 'Na plecach, ręce pod pośladkami. Nogi proste do 90°, powolne opuszczanie. Lędźwie nie odrywają się.',
            },
          ],
        },
      ];

      const STATE_KEY = 'trening_state_v2';
      const HIST_KEY = 'trening_history_v2';
      const EDITS_KEY = 'trening_edits_v1';

      let state = loadState();
      let history = loadHistory();
      let edits = loadEdits();

      function loadState() {
        try {
          const s = JSON.parse(localStorage.getItem(STATE_KEY));
          if (s && s.days) return s;
        } catch (e) {}
        return {
          days: DAYS.map((d) => ({
            done: new Array(d.exercises.length).fill(false),
          })),
        };
      }
      function loadHistory() {
        try {
          const h = JSON.parse(localStorage.getItem(HIST_KEY));
          if (Array.isArray(h)) return h;
        } catch (e) {}
        return [];
      }
      function saveState() {
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
      }
      function saveHistory() {
        localStorage.setItem(HIST_KEY, JSON.stringify(history));
      }
      function loadEdits() {
        try {
          const e = JSON.parse(localStorage.getItem(EDITS_KEY));
          if (e && typeof e === 'object') return e;
        } catch (e) {}
        return {};
      }
      function saveEdits() {
        localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
      }
      function getExName(di, ei) {
        return (
          (edits[di + '_' + ei] && edits[di + '_' + ei].name) ||
          DAYS[di].exercises[ei].name
        );
      }
      function getExTip(di, ei) {
        return (
          (edits[di + '_' + ei] && edits[di + '_' + ei].tip) ||
          DAYS[di].exercises[ei].tip
        );
      }
      function getExSets(di, ei) {
        return (
          (edits[di + '_' + ei] && edits[di + '_' + ei].sets) ||
          DAYS[di].exercises[ei].sets
        );
      }
      function getExRir(di, ei) {
        return (
          (edits[di + '_' + ei] && edits[di + '_' + ei].rir) ||
          DAYS[di].exercises[ei].rir
        );
      }
      function getExRirLabel(di, ei) {
        return (
          (edits[di + '_' + ei] && edits[di + '_' + ei].rirLabel) ||
          DAYS[di].exercises[ei].rirLabel
        );
      }

      function totalDone() {
        return state.days.reduce(
          (a, d) => a + d.done.filter(Boolean).length,
          0
        );
      }
      function totalEx() {
        return DAYS.reduce((a, d) => a + d.exercises.length, 0);
      }

      // ── BUILD TRACKER UI ──────────────────────────────────────────
      const tabsEl = document.getElementById('dayTabs');
      const panelsEl = document.getElementById('panels');

      DAYS.forEach((day, di) => {
        const tab = document.createElement('div');
        tab.className = 'day-tab' + (di === 0 ? ' active' : '');
        tab.setAttribute('data-day', di);
        tab.innerHTML = `<div>${day.short}</div><div class="tab-dot"></div><div class="tab-pct" id="tabPct${di}">0%</div>`;
        tab.addEventListener('click', () => switchDay(di));
        tabsEl.appendChild(tab);

        const panel = document.createElement('div');
        panel.className = 'day-panel' + (di === 0 ? ' active' : '');
        panel.id = `panel${di}`;
        panel.innerHTML = `
    <div class="day-header-bar" style="border-top:2px solid ${day.color}">
      <div>
        <div class="day-name" style="color:${day.color}">${day.name}</div>
        <div class="day-sub">${day.sub}</div>
      </div>
      <div style="text-align:right">
        <div class="day-pct-big" id="dayPct${di}" style="color:${day.color}">0%</div>
        <div class="day-time">⏱ ${day.time}</div>
      </div>
    </div>`;

        day.exercises.forEach((ex, ei) => {
          if (edits[di + '_' + ei] && edits[di + '_' + ei].deleted) return;
          buildExCard(panel, di, ei);
        });

        // Custom (user-added) exercises
        const customs = (edits.__custom && edits.__custom[di]) || [];
        customs.forEach((cex, ci) => buildCustomCard(panel, di, ci, cex));

        // Add exercise button
        const addBtn = document.createElement('button');
        addBtn.className = 'add-ex-btn';
        addBtn.innerHTML = '＋ Dodaj ćwiczenie';
        addBtn.addEventListener('click', () => addExercise(di));
        panel.appendChild(addBtn);

        // Reset day button
        const resetDayBtn = document.createElement('button');
        resetDayBtn.className = 'reset-day-btn';
        resetDayBtn.innerHTML = '↺ Przywróć domyślne ćwiczenia dnia';
        resetDayBtn.addEventListener('click', () => resetDay(di));
        panel.appendChild(resetDayBtn);

        panelsEl.appendChild(panel);
      });

      function switchDay(di) {
        document
          .querySelectorAll('.day-tab')
          .forEach((t) => t.classList.remove('active'));
        document
          .querySelectorAll('.day-panel')
          .forEach((p) => p.classList.remove('active'));
        document
          .querySelector(`.day-tab[data-day="${di}"]`)
          .classList.add('active');
        document.getElementById(`panel${di}`).classList.add('active');
      }

      function toggleDone(di, ei) {
        state.days[di].done[ei] = !state.days[di].done[ei];
        saveState();
        renderState();
        if (state.days[di].done[ei] && state.days[di].done.every(Boolean))
          showToast('Dzień ukończony! 💪');
      }

      function openEdit(e, di, ei) {
        e.stopPropagation();
        const panel = document.getElementById(`editpanel_${di}_${ei}`);
        const card = document.getElementById(`ex_${di}_${ei}`);
        const isOpen = panel.classList.contains('open');
        // close all other edit panels
        document
          .querySelectorAll('.ex-edit-panel.open')
          .forEach((p) => p.classList.remove('open'));
        document
          .querySelectorAll('.ex-card.editing')
          .forEach((c) => c.classList.remove('editing'));
        if (!isOpen) {
          panel.classList.add('open');
          card.classList.add('editing');
          document.getElementById(`editname_${di}_${ei}`).value = getExName(
            di,
            ei
          );
          document.getElementById(`edittip_${di}_${ei}`).value = getExTip(
            di,
            ei
          );
        }
      }
      function closeEdit(di, ei) {
        document
          .getElementById(`editpanel_${di}_${ei}`)
          .classList.remove('open');
        document.getElementById(`ex_${di}_${ei}`).classList.remove('editing');
      }
      function saveEdit(di, ei) {
        const name = document
          .getElementById(`editname_${di}_${ei}`)
          .value.trim();
        const tip = document.getElementById(`edittip_${di}_${ei}`).value.trim();
        if (!name) return;
        const key = di + '_' + ei;
        const orig = DAYS[di].exercises[ei];
        if (name === orig.name && tip === orig.tip) {
          delete edits[key];
        } else {
          edits[key] = { name, tip };
        }
        saveEdits();
        document.getElementById(`exname_${di}_${ei}`).textContent = getExName(
          di,
          ei
        );
        document.getElementById(`extip_${di}_${ei}`).textContent = getExTip(
          di,
          ei
        );
        closeEdit(di, ei);
        showToast('Zapisano ✓');
      }
      function resetEdit(di, ei) {
        delete edits[di + '_' + ei];
        saveEdits();
        document.getElementById(`editname_${di}_${ei}`).value =
          DAYS[di].exercises[ei].name;
        document.getElementById(`edittip_${di}_${ei}`).value =
          DAYS[di].exercises[ei].tip;
        document.getElementById(`exname_${di}_${ei}`).textContent =
          DAYS[di].exercises[ei].name;
        document.getElementById(`extip_${di}_${ei}`).textContent =
          DAYS[di].exercises[ei].tip;
        closeEdit(di, ei);
        showToast('Przywrócono domyślne');
      }

      function buildExCard(panel, di, ei) {
        const ex = DAYS[di].exercises[ei];
        const card = document.createElement('div');
        card.className = 'ex-card';
        card.id = `ex_${di}_${ei}`;
        const exSets = getExSets(di, ei);
        const exRir = getExRir(di, ei);
        const exRirLabel = getExRirLabel(di, ei);
        const tc =
          exRir === 'easy'
            ? 'tag-rir-easy'
            : exRir === 'mid'
              ? 'tag-rir-mid'
              : exRir === 'none'
                ? ''
                : 'tag-rir-hard';
        card.innerHTML = `
    <div class="ex-main">
      <div class="ex-check" id="check_${di}_${ei}"></div>
      <div class="ex-info">
        <div class="ex-name" id="exname_${di}_${ei}">${getExName(di, ei)}</div>
        <div class="ex-meta">

        let pt = null;
        card.addEventListener(

      function buildCustomCard(panel, di, ci, cex) {

                ? ''
                : 'tag-rir-hard';
        const card = document.createElement('div');

        card.innerHTML = `
    <div class="ex-main">

    <div class="ex-edit-panel" id="editpanel_${cid}">

      <div class="edit-field-label" style="margin-top:8px">Intensywność</div>
      <div class="edit-rir-row" id="editrir_${cid}">
        <button class="rir-opt${rir === 'hard' ? ' active' : ''}" data-rir="hard" data-label="do upadku" onclick="pickRirC(this,'${cid}')">Do upadku</button>
        <button class="rir-opt${rir === 'mid' ? ' active' : ''}"  data-rir="mid"  data-label="1 RIR"     onclick="pickRirC(this,'${cid}')">1 RIR</button>
        <button class="rir-opt${rir === 'easy' ? ' active' : ''}" data-rir="easy" data-label="2–3 RIR"   onclick="pickRirC(this,'${cid}')">2–3 RIR</button>
        <button class="rir-opt${rir === 'none' ? ' active' : ''}" data-rir="none" data-label=""           onclick="pickRirC(this,'${cid}')">Brak</button>
      </div>
      <div class="edit-field-label" style="margin-top:8px">Wskazówka (po przytrzymaniu)</div>
      <textarea class="edit-textarea" id="edittip_${cid}">${cex.tip}</textarea>
      <div class="edit-actions">
        <button class="edit-cancel" onclick="closeCustomEdit('${cid}')">Anuluj</button>
        <button class="edit-delete" onclick="deleteCustom(${di},${ci})">✕ Usuń</button>
        <button class="edit-save"   onclick="saveCustom('${cid}',${di},${ci})">Zapisz</button>
      </div>
    </div>`;
        let pt = null;
        card.addEventListener(
          'touchstart',
          (e) => {
            if (e.target.closest('button,input,textarea')) return;
            pt = setTimeout(() => {
              pt = null;
              card.classList.toggle('expanded');
            }, 400);
          },
          { passive: true }
        );
        card.addEventListener('touchend', (e) => {
          if (e.target.closest('button,input,textarea')) return;
          if (pt !== null) {
            clearTimeout(pt);
            pt = null;
            toggleCustomDone(cid);
          }
        });
        card.addEventListener('click', (e) => {
          if (
            !('ontouchstart' in window) &&
            !e.target.closest('button,input,textarea')
          )
            toggleCustomDone(cid);
        });
        panel.appendChild(card);
      }
      function toggleCustomDone(cid) {
        const check = document.getElementById('check_' + cid);
        if (!check) return;
        const done = check.textContent !== '✓';
        check.textContent = done ? '✓' : '';
        document.getElementById('ex_' + cid).classList.toggle('done', done);
      }
      function openCustomEdit(e, cid, di, ci) {
        e.stopPropagation();
        const panel = document.getElementById('editpanel_' + cid);
        const isOpen = panel.classList.contains('open');
        document
          .querySelectorAll('.ex-edit-panel.open')
          .forEach((p) => p.classList.remove('open'));
        document
          .querySelectorAll('.ex-card.editing')
          .forEach((c) => c.classList.remove('editing'));
        if (!isOpen) {
          panel.classList.add('open');
          document.getElementById('ex_' + cid).classList.add('editing');
        }
      }
      function closeCustomEdit(cid) {
        document.getElementById('editpanel_' + cid).classList.remove('open');
        document.getElementById('ex_' + cid).classList.remove('editing');
      }
      function pickRirC(btn, cid) {
        document
          .querySelectorAll(`#editrir_${cid} .rir-opt`)
          .forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
      }
      function saveCustom(cid, di, ci) {
        const name =
          document.getElementById('editname_' + cid).value.trim() ||
          'Ćwiczenie';
        const sets =
          document.getElementById('editsets_' + cid).value.trim() || '3 × 10';
        const tip = document.getElementById('edittip_' + cid).value.trim();
        const active = document.querySelector(
          `#editrir_${cid} .rir-opt.active`
        );
        const rir = active ? active.dataset.rir : 'hard';
        const rirLabel = active ? active.dataset.label : 'do upadku';
        if (!edits.__custom) edits.__custom = {};
        if (!edits.__custom[di]) edits.__custom[di] = [];
        edits.__custom[di][ci] = { name, sets, rir, rirLabel, tip };
        saveEdits();
        const tc =
          rir === 'easy'
            ? 'tag-rir-easy'
            : rir === 'mid'
              ? 'tag-rir-mid'
              : rir === 'none'
                ? ''
                : 'tag-rir-hard';
        document.getElementById('exname_' + cid).textContent = name;
        document.getElementById('extip_' + cid).textContent = tip;
        document.getElementById('extag_sets_' + cid).textContent = sets;
        const rirEl = document.getElementById('extag_rir_' + cid);
        rirEl.textContent = rirLabel;
        rirEl.className = 'tag ' + tc;
        closeCustomEdit(cid);
        showToast('Zapisano ✓');
      }
      function deleteCustom(di, ci) {
        if (!confirm('Usunąć to ćwiczenie?')) return;
        if (edits.__custom && edits.__custom[di]) {
          edits.__custom[di].splice(ci, 1);
          saveEdits();
          rebuildPanel(di);
          showToast('Usunięto');
        }
      }
      function addExercise(di) {
        if (!edits.__custom) edits.__custom = {};
        if (!edits.__custom[di]) edits.__custom[di] = [];
        edits.__custom[di].push({
          name: 'Nowe ćwiczenie',
          sets: '3 × 10',
          rir: 'hard',
          rirLabel: 'do upadku',
          tip: '',
        });
        saveEdits();
        rebuildPanel(di);
        // open last custom card edit panel
        const ci = edits.__custom[di].length - 1;
        const cid = `c${di}_${ci}`;
        setTimeout(() => {
          const p = document.getElementById('editpanel_' + cid);
          if (p) {
            p.classList.add('open');
            document.getElementById('ex_' + cid).classList.add('editing');
            p.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }, 50);
      }
      function resetDay(di) {
        if (
          !confirm(
            'Przywrócić wszystkie domyślne ćwiczenia dnia? Twoje zmiany i dodane ćwiczenia zostaną usunięte.'
          )
        )
          return;
        Object.keys(edits).forEach((k) => {
          if (k.startsWith(di + '_')) delete edits[k];
        });
        if (edits.__custom) delete edits.__custom[di];
        saveEdits();
        state.days[di].done = new Array(DAYS[di].exercises.length).fill(false);
        saveState();
        rebuildPanel(di);
        renderState();
        showToast('Przywrócono domyślne ćwiczenia');
      }
      function rebuildPanel(di) {
        const panel = document.getElementById('panel' + di);
        panel
          .querySelectorAll('.ex-card,.add-ex-btn,.reset-day-btn')
          .forEach((el) => el.remove());
        DAYS[di].exercises.forEach((ex, ei) => {
          if (edits[di + '_' + ei] && edits[di + '_' + ei].deleted) return;
          buildExCard(panel, di, ei);
        });
        ((edits.__custom && edits.__custom[di]) || []).forEach((cex, ci) =>
          buildCustomCard(panel, di, ci, cex)
        );
        const addBtn = document.createElement('button');
        addBtn.className = 'add-ex-btn';
        addBtn.innerHTML = '＋ Dodaj ćwiczenie';
        addBtn.addEventListener('click', () => addExercise(di));
        panel.appendChild(addBtn);
        const rdBtn = document.createElement('button');
        rdBtn.className = 'reset-day-btn';
        rdBtn.innerHTML = '↺ Przywróć domyślne ćwiczenia dnia';
        rdBtn.addEventListener('click', () => resetDay(di));
        panel.appendChild(rdBtn);
      }
      function renderState() {
        DAYS.forEach((day, di) => {
          const cnt = state.days[di].done.filter(Boolean).length;
          const pct = Math.round((cnt / day.exercises.length) * 100);
          document.getElementById(`dayPct${di}`).textContent = pct + '%';
          document.getElementById(`tabPct${di}`).textContent = pct + '%';
          day.exercises.forEach((_, ei) => {
            const card = document.getElementById(`ex_${di}_${ei}`);
            const check = document.getElementById(`check_${di}_${ei}`);
            const done = state.days[di].done[ei];
            card.classList.toggle('done', done);
            check.textContent = done ? '✓' : '';
          });
        });
        const pct = Math.round((totalDone() / totalEx()) * 100);
        document.getElementById('globalPct').textContent = pct + '%';
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('globalPct').style.color =
          pct === 100 ? '#22c55e' : pct > 50 ? '#f59e0b' : '#f0ede8';
      }

      // ── RESET & SAVE SESSION ──────────────────────────────────────
      function openReset() {
        document.getElementById('overlay').classList.add('show');
      }
      function closeReset() {
        document.getElementById('overlay').classList.remove('show');
      }
      function overlayClick(e) {
        if (e.target === document.getElementById('overlay')) closeReset();
      }

      function doReset() {
        const now = new Date();
        const dow = (now.getDay() + 6) % 7;

        DAYS.forEach((day, di) => {
          const done = state.days[di].done;
          const doneCnt = done.filter(Boolean).length;
          if (doneCnt === 0) return;

          const diff = (dow - di + 7) % 7;
          const sessionDate = new Date(now);
          sessionDate.setDate(now.getDate() - diff);
          const dateStr = sessionDate.toISOString().slice(0, 10);

          const entry = {
            date: dateStr,
            dayIndex: di,
            dayName: day.name,
            done: [...done],
            pct: Math.round((doneCnt / done.length) * 100),
          };

          // Overwrite if same date+day already exists
          const idx = history.findIndex(
            (s) => s.date === dateStr && s.dayIndex === di
          );
          if (idx !== -1) history[idx] = entry;
          else history.push(entry);
        });

        saveHistory();
        state.days.forEach((d) => d.done.fill(false));
        saveState();
        renderState();
        closeReset();
        showToast('Zapisano do historii! 🔥');
        renderHistory();
      }

      // ── HISTORY VIEW ──────────────────────────────────────────────
      function switchView(name) {
        document
          .querySelectorAll('.view')
          .forEach((v) => v.classList.remove('active'));
        document
          .querySelectorAll('.nav-btn')
          .forEach((b) => b.classList.remove('active'));
        document.getElementById('view-' + name).classList.add('active');
        document.getElementById('nav-' + name).classList.add('active');
        if (name === 'historia') renderHistory();
      }

      const PL_MONTHS = [
        'Styczeń',
        'Luty',
        'Marzec',
        'Kwiecień',
        'Maj',
        'Czerwiec',
        'Lipiec',
        'Sierpień',
        'Wrzesień',
        'Październik',
        'Listopad',
        'Grudzień',
      ];
      const PL_DAYS_SHORT = ['Pn', 'Wt', 'Śr', 'Cz', 'Pt', 'Sb', 'Nd'];

      function renderHistory() {
        // Stats
        const total = history.length;
        const avgPct = total
          ? Math.round(history.reduce((a, s) => a + s.pct, 0) / total)
          : 0;

        // Streak: consecutive weeks with at least 1 session
        let streak = 0;
        if (total > 0) {
          const weeks = new Set(
            history.map((s) => {
              const d = new Date(s.date);
              const startOfYear = new Date(d.getFullYear(), 0, 1);
              return (
                d.getFullYear() +
                '_' +
                Math.ceil(
                  ((d - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7
                )
              );
            })
          );
          const now = new Date();
          let checkWeek = new Date(now);
          for (let i = 0; i < 52; i++) {
            const soy = new Date(checkWeek.getFullYear(), 0, 1);
            const wk =
              checkWeek.getFullYear() +
              '_' +
              Math.ceil(((checkWeek - soy) / 86400000 + soy.getDay() + 1) / 7);
            if (weeks.has(wk)) {
              streak++;
              checkWeek.setDate(checkWeek.getDate() - 7);
            } else break;
          }
        }

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statStreak').textContent = streak;
        document.getElementById('statAvg').textContent = avgPct + '%';

        // Calendar
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        document.getElementById('calMonthLabel').textContent =
          PL_MONTHS[month] + ' ' + year;

        const calGrid = document.getElementById('calGrid');
        calGrid.innerHTML = '';

        PL_DAYS_SHORT.forEach((d) => {
          const el = document.createElement('div');
          el.className = 'cal-day-label';
          el.textContent = d;
          calGrid.appendChild(el);
        });

        const firstDay = new Date(year, month, 1);
        const firstDow = (firstDay.getDay() + 6) % 7; // 0=Mon
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // Build date->sessions map
        const dateMap = {};
        history.forEach((s) => {
          if (!dateMap[s.date]) dateMap[s.date] = [];
          dateMap[s.date].push(s);
        });

        // Empty cells before month start
        for (let i = 0; i < firstDow; i++) {
          const el = document.createElement('div');
          el.className = 'cal-cell empty';
          calGrid.appendChild(el);
        }

        const dayColors = [
          '#e8453c',
          '#3b82f6',
          '#22c55e',
          '#a855f7',
          '#f59e0b',
        ];

        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const sessions = dateMap[dateStr] || [];
          const isToday =
            d === now.getDate() &&
            month === now.getMonth() &&
            year === now.getFullYear();

          const el = document.createElement('div');
          el.className =
            'cal-cell' +
            (isToday ? ' today' : '') +
            (sessions.length ? ' has-session' : '');

          const numEl = document.createElement('div');
          numEl.className = 'cal-num';
          numEl.textContent = d;
          el.appendChild(numEl);

          if (sessions.length) {
            const color = dayColors[sessions[0].dayIndex];
            const pct = sessions[0].pct;
            el.style.background = color + '22';
            el.style.borderColor = color + '88';
            numEl.style.color = color;
            const wm = document.createElement('div');
            wm.className = 'cal-watermark';
            wm.style.color = color;
            wm.textContent = pct + '%';
            el.appendChild(wm);
            el.addEventListener('click', () => scrollToSession(dateStr));
          }
          calGrid.appendChild(el);
        }

        // Session list (sorted newest first)
        const sessionList = document.getElementById('sessionList');
        const sorted = [...history].reverse();

        if (sorted.length === 0) {
          sessionList.innerHTML = `
      <div class="empty-hist">
        <div class="empty-hist-icon">🏋️</div>
        <div class="empty-hist-text">Brak zapisanych sesji.<br>Po treningu kliknij "Reset tyg." żeby zapisać tydzień do historii.</div>
      </div>`;
          return;
        }

        sessionList.innerHTML = '';
        sorted.forEach((session, idx) => {
          const d = new Date(session.date);
          const dayNum = d.getDate();
          const monthStr = PL_MONTHS[d.getMonth()].slice(0, 3).toUpperCase();
          const color = dayColors[session.dayIndex];
          const exList = DAYS[session.dayIndex].exercises;

          const card = document.createElement('div');
          card.className = 'session-card';
          card.id = 'sess_' + session.date + '_' + session.dayIndex;

          const exRows = exList
            .map((ex, ei) => {
              const done = session.done[ei];
              return `<div class="session-ex-row">
        <div class="session-ex-check ${done ? 'done' : 'skip'}">${done ? '✓' : '–'}</div>
        <div class="session-ex-name ${done ? 'done' : ''}">${ex.name}</div>
      </div>`;
            })
            .join('');

          card.innerHTML = `
      <div class="session-main">
        <div class="session-date-box">
          <div class="session-day-num" style="color:${color}">${dayNum}</div>
          <div class="session-month">${monthStr}</div>
        </div>
        <div class="session-info">
          <div class="session-name">${session.dayName}</div>
          <div class="session-meta">${session.pct === 100 ? 'Pełny trening ✓' : 'Częściowy – ' + session.pct + '%'}</div>
        </div>
        <div class="session-pct" style="color:${color}">${session.pct}%</div>
        <button class="session-delete" title="Usuń sesję">🗑</button>
      </div>
      <div class="session-detail">
        <div class="session-ex-list">${exRows}</div>
      </div>`;

          card.querySelector('.session-main').addEventListener('click', (e) => {
            if (e.target.closest('.session-delete')) return;
            card.classList.toggle('open');
          });
          card
            .querySelector('.session-delete')
            .addEventListener('click', (e) => {
              e.stopPropagation();
              deleteSession(session.date, session.dayIndex);
            });

          sessionList.appendChild(card);
        });
      }

      function deleteSession(date, dayIndex) {
        const idx = history.findIndex(
          (s) => s.date === date && s.dayIndex === dayIndex
        );
        if (idx !== -1) {
          history.splice(idx, 1);
          saveHistory();
          renderHistory();
          showToast('Sesja usunięta');
        }
      }

      function scrollToSession(dateStr) {
        // Find first matching session card and scroll to it
        const cards = document.querySelectorAll('.session-card');
        for (const card of cards) {
          if (card.id.includes(dateStr)) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.classList.add('open');
            break;
          }
        }
      }

      // Toast
      let toastTimer;
      function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
      }

      renderState();
      setTimeout(() => showToast('Dotknij ćwiczenie = odhaczasz ✓'), 600);
    </script>
  </body>
</html>
