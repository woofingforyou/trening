<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tracker Treningowy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1c;
    --surface2: #242426;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --muted: #6b6966;
    --mon: #e8453c;
    --tue: #3b82f6;
    --wed: #22c55e;
    --thu: #a855f7;
    --fri: #f59e0b;
    --done-bg: rgba(34,197,94,0.12);
    --done-border: rgba(34,197,94,0.4);
    --done-text: #86efac;
    --radius: 14px;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html { background: var(--bg); }

  body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── HEADER ── */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .app-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .global-progress {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .global-pct {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    min-width: 52px;
    text-align: right;
    transition: color 0.3s;
  }

  .reset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .reset-btn:active { transform: scale(0.95); background: #2a2a2c; color: var(--text); }

  /* ── PROGRESS BAR ── */
  .progress-track {
    height: 3px;
    background: var(--surface2);
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #22c55e, #86efac);
    width: 0%;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 0 2px 2px 0;
  }

  /* ── DAY TABS ── */
  .day-tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 14px 18px 0;
    -webkit-overflow-scrolling: touch;
  }
  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 10px 10px 0 0;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    border-bottom: none;
    background: var(--surface);
    color: var(--muted);
    position: relative;
    transition: all 0.15s;
    letter-spacing: 0.3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 62px;
    text-align: center;
  }
  .day-tab.active {
    color: var(--text);
    background: var(--surface2);
    border-color: var(--border);
  }
  .day-tab .tab-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }
  .day-tab.active .tab-dot { background: currentColor; }
  .day-tab[data-day="0"] { color: var(--mon); }
  .day-tab[data-day="1"] { color: var(--tue); }
  .day-tab[data-day="2"] { color: var(--wed); }
  .day-tab[data-day="3"] { color: var(--thu); }
  .day-tab[data-day="4"] { color: var(--fri); }

  .tab-pct {
    font-size: 10px;
    opacity: 0.7;
  }

  /* ── DAY PANEL ── */
  .day-panel { display: none; padding: 0 18px 20px; }
  .day-panel.active { display: block; }

  .day-header-bar {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    background: var(--surface2);
    padding: 14px 16px 12px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .day-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .day-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .day-stats {
    text-align: right;
  }
  .day-pct-big {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    transition: color 0.3s;
  }
  .day-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── EXERCISE CARD ── */
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.25s, background 0.25s;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .ex-card:active { transform: scale(0.985); }
  .ex-card.done {
    background: var(--done-bg);
    border-color: var(--done-border);
  }

  .ex-main {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
  }

  .ex-check {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: var(--surface2);
    font-size: 14px;
  }
  .ex-card.done .ex-check {
    background: #22c55e;
    border-color: #22c55e;
    transform: scale(1.1);
  }

  .ex-info { flex: 1; min-width: 0; }
  .ex-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    transition: color 0.2s;
  }
  .ex-card.done .ex-name { color: var(--done-text); }

  .ex-meta {
    display: flex;
    gap: 8px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.3px;
    font-weight: 500;
  }
  .tag-sets {
    background: rgba(255,255,255,0.07);
    color: #93c5fd;
  }
  .tag-rir-easy { background: rgba(34,197,94,0.15); color: #86efac; }
  .tag-rir-mid  { background: rgba(245,158,11,0.15); color: #fcd34d; }
  .tag-rir-hard { background: rgba(239,68,68,0.18); color: #fca5a5; }

  .ex-toggle-tip {
    font-size: 10px;
    color: var(--muted);
    padding: 0 16px 10px;
    letter-spacing: 0.2px;
    line-height: 1.5;
    display: none;
  }
  .ex-card.expanded .ex-toggle-tip { display: block; }
  .ex-card.done .ex-toggle-tip { color: rgba(134,239,172,0.6); }

  /* ── RESET CONFIRM OVERLAY ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  .confirm-sheet {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 24px 36px;
    width: 100%;
    max-width: 480px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
  }
  .overlay.show .confirm-sheet { transform: translateY(0); }

  .confirm-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .confirm-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .confirm-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .confirm-btns { display: flex; gap: 10px; }
  .btn-cancel {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:active { background: var(--surface2); }

  .btn-confirm {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #e8453c;
    color: #fff;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-confirm:active { transform: scale(0.96); background: #c0392b; }

  /* ── COMPLETION TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #22c55e;
    color: #052e16;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    padding: 12px 22px;
    border-radius: 50px;
    z-index: 300;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="app-title">TRENING</div>
  </div>
  <div class="global-progress">
    <div class="global-pct" id="globalPct">0%</div>
    <button class="reset-btn" onclick="openReset()">Reset tyg.</button>
  </div>
</header>
<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

<div class="day-tabs" id="dayTabs"></div>
<div id="panels"></div>

<!-- Reset confirm -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="confirm-sheet">
    <div class="confirm-handle"></div>
    <div class="confirm-title">Nowy tydzień?</div>
    <div class="confirm-sub">Wszystkie ćwiczenia zostaną odznaczone. Użyj na początku weekendu, przed nowym tygodniem.</div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeReset()">Anuluj</button>
      <button class="btn-confirm" onclick="doReset()">Reset ✓</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = [
  {
    name: "Poniedziałek", short: "Pon", sub: "Klatka + Triceps", time: "~65 min", color: "#e8453c",
    exercises: [
      { name: "Wyciskanie pod kątem (głowa wyżej)", sets: "4 × 8–12", rir: "hard", rirLabel: "do upadku (ost. seria)", tip: "Ławka 30–45°. Łokcie 45° od tułowia. Zacznij tu – górna klatka potrzebuje świeżości. Serie 1–3: 2–3 powt. w zapasie." },
      { name: "Wyciskanie na ławce płaskiej", sets: "4 × 8–12", rir: "mid", rirLabel: "1 RIR (ost. seria: upadek)", tip: "Łopatki ściągnięte do tyłu i w dół. Łokcie 45° od ciała. Nie blokuj łokci na górze." },
      { name: "Pompki z nogami na ławce", sets: "3 × max", rir: "hard", rirLabel: "do upadku", tip: "Nogi na ławce, ręce na podłodze. Ciało w linii. Klatka prawie dotyka podłogi." },
      { name: "Wyciskanie z rotacją (zamiennik rozpiątek)", sets: "3 × 12", rir: "hard", rirLabel: "do upadku", tip: "Start: hantle równolegle. Na górze obracasz – kciuki się spotykają. Ściskasz środek klatki." },
      { name: "Prostowanie triceps znad głowy", sets: "3 × 12–15", rir: "hard", rirLabel: "do upadku", tip: "Łokcie blisko głowy, nie rozchylaj. Hantel schodzi za głowę – pełen zakres." },
      { name: "Wyciskanie tricepsa z gumą", sets: "3 × 15", rir: "hard", rirLabel: "do upadku", tip: "Guma pod stopami, łokcie przy ciele. Ostatnie ćwiczenie – daj wszystko." },
    ]
  },
  {
    name: "Wtorek", short: "Wt", sub: "Plecy + Biceps", time: "~70 min", color: "#3b82f6",
    exercises: [
      { name: "Podciąganie nachwyt (szeroki chwyt)", sets: "4 × max", rir: "mid", rirLabel: "1–2 RIR (ost. seria: upadek)", tip: "Nachwyt szerszy niż ramiona. Klatka do drążka. Powolne opuszczanie 3 sek." },
      { name: "Podciąganie podchwyt (wąski chwyt)", sets: "3 × max", rir: "hard", rirLabel: "do upadku", tip: "Dłonie do ciebie, chwyt węższy. Bardziej angażuje biceps. Łokcie w dół i do tyłu." },
      { name: "Wiosłowanie sztangielką w opadzie", sets: "4 × 10–12", rir: "mid", rirLabel: "2 RIR (ost. seria: upadek)", tip: "Kolano i dłoń na ławce. Plecy PROSTE, równolegle do podłogi. Łokieć prosto w górę i za siebie." },
      { name: "Ściąganie gumy z drążka", sets: "3 × 15", rir: "hard", rirLabel: "do upadku", tip: "Guma w drążku. Ściągasz do pasa lub w dół. Łopatki zbliżają się do siebie." },
      { name: "Uginanie biceps stojąco", sets: "3 × 12", rir: "hard", rirLabel: "do upadku", tip: "Łokcie przy ciele – NIE ruszają się. Pełen zakres. Nie bujaj tułowiem." },
      { name: "Uginanie młotkowe", sets: "3 × 12", rir: "hard", rirLabel: "do upadku", tip: "Kciuk w górę (neutralny chwyt). Buduje brachialis – dodatkowa grubość ramienia." },
    ]
  },
  {
    name: "Środa", short: "Śr", sub: "Nogi + Pośladki", time: "~75 min", color: "#22c55e",
    exercises: [
      { name: "Przysiad goblet ze sztangielką", sets: "4 × 12–15", rir: "mid", rirLabel: "2 RIR (ost. seria: upadek)", tip: "Hantel pionowo przy klatce. Stopy nieco szerzej, palce na zewnątrz. Zejdź nisko – uda równolegle lub niżej." },
      { name: "Wykroki ze sztangielkami", sets: "3 × 10/nogę", rir: "mid", rirLabel: "1–2 RIR", tip: "Tułów pionowo. Kolano tylnej nogi prawie dotyka podłogi. Wracasz przez piętę przedniej nogi." },
      { name: "Hip thrust (nogi na ławce)", sets: "4 × 15", rir: "hard", rirLabel: "do upadku", tip: "Barki na ławce. Biodra w górę – ściskasz pośladki 1 sekundę na górze. Kolana nie do środka." },
      { name: "Martwy ciąg rumuński", sets: "3 × 12", rir: "easy", rirLabel: "2 RIR (max 1 RIR ost. seria)", tip: "WAŻNE przy lędźwiach: plecy zawsze proste, neutralny kręgosłup. Schodzisz do połowy łydki. Hantle blisko nóg." },
      { name: "Wspięcia na palce (stojąco)", sets: "4 × 20", rir: "hard", rirLabel: "do upadku", tip: "Pełen zakres: pięta nisko, potem max wspięcie. Powolne opuszczanie 3 sek – tam jest wzrost." },
      { name: "Odwodzenie nóg z gumą", sets: "3 × 20", rir: "hard", rirLabel: "do upadku", tip: "Guma nad kolanami. Rozkładasz kolana na boki. Biodra i tułów stabilne." },
    ]
  },
  {
    name: "Czwartek", short: "Czw", sub: "Barki + Górne plecy", time: "~65 min", color: "#a855f7",
    exercises: [
      { name: "Wyciskanie nad głową (siedząc)", sets: "4 × 10–12", rir: "mid", rirLabel: "2 RIR (ost. seria: upadek)", tip: "Ławka pionowo. Łokcie lekko PRZED tułowiem – nie rozchylaj na boki. Nie blokuj łokci na górze." },
      { name: "Unoszenie boczne", sets: "3 × 12–15", rir: "hard", rirLabel: "do upadku", tip: "LEKKI ciężar. Łokcie delikatnie ugięte. Unosisz do ramion. Kontrolowane opuszczanie. Nie bujaj." },
      { name: "Unoszenie przodem", sets: "3 × 12", rir: "hard", rirLabel: "do upadku", tip: "Na przemian lub jednocześnie. Do wysokości barków. Kciuk lekko wyżej niż mały palec." },
      { name: "Odwrotne rozpiętki w opadzie", sets: "3 × 15", rir: "hard", rirLabel: "do upadku", tip: "Tułów równolegle do podłogi. Unosisz hantle na boki. Łopatki zbliżają się w szczycie." },
      { name: "Face pull z gumy (drążek)", sets: "3 × 15", rir: "hard", rirLabel: "do upadku", tip: "Guma na wysokości twarzy. Ściągasz do twarzy, łokcie wysoko. Kciuki do twarzy. Zdrowie barku." },
      { name: "Rotacja zewnętrzna z gumą", sets: "3 × 15", rir: "hard", rirLabel: "do upadku", tip: "Łokieć przy boku, 90°. Obracasz przedramię na zewnątrz. Łokieć nieruchomy. Stożek rotatorów." },
    ]
  },
  {
    name: "Piątek", short: "Pt", sub: "Core + Stabilizacja", time: "~55 min", color: "#f59e0b",
    exercises: [
      { name: "Prostownik grzbietu (ławka rzymska)", sets: "4 × 12–15", rir: "easy", rirLabel: "2 RIR (max 1 RIR ost. seria)", tip: "PRIORYTET przy lędźwiach. Mały zakres na start. Neutralny kręgosłup – nie zaokrąglasz. Powolny ruch w dół." },
      { name: "Deska na łokciach (plank)", sets: "3 × 30–45 sek", rir: "hard", rirLabel: "do upadku (czasu)", tip: "Łokcie pod barkami. Biodra równo. Brzuch napięty, oddychasz. Jak forma się psuje – kończ." },
      { name: "Deska boczna", sets: "3 × 20–30 sek/str", rir: "hard", rirLabel: "do upadku (czasu)", tip: "Jedno przedramię. Biodra w górze – prosta linia od głowy do stóp." },
      { name: "Martwy błąd (dead bug)", sets: "3 × 10/stronę", rir: "easy", rirLabel: "2 RIR – technika ważna", tip: "Na plecach. Opuszczasz przeciwne ramię i nogę jednocześnie. Lędźwie ZAWSZE przy macie. Powoli." },
      { name: "Wznosy kolan na drążku", sets: "3 × 12", rir: "hard", rirLabel: "do upadku", tip: "Zwisasz na drążku. Kolana do klatki, powolne opuszczanie. Bez kiwania – napnij brzuch przed ruchem." },
      { name: "Wznosy nóg (leżąc)", sets: "3 × 12", rir: "hard", rirLabel: "do upadku", tip: "Na plecach, ręce pod pośladkami. Nogi proste do 90°, powolne opuszczanie. Lędźwie nie odrywają się." },
    ]
  },
];

// State
const STATE_KEY = "trening_state_v1";
let state = loadState();

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY));
    if (s && s.days) return s;
  } catch(e) {}
  return { days: DAYS.map(d => ({ done: new Array(d.exercises.length).fill(false) })) };
}

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

function totalDone() {
  return state.days.reduce((a, d) => a + d.done.filter(Boolean).length, 0);
}
function totalEx() {
  return DAYS.reduce((a, d) => a + d.exercises.length, 0);
}

// Build UI
let activeDay = 0;
const tabsEl = document.getElementById("dayTabs");
const panelsEl = document.getElementById("panels");

DAYS.forEach((day, di) => {
  // Tab
  const tab = document.createElement("div");
  tab.className = "day-tab" + (di === 0 ? " active" : "");
  tab.setAttribute("data-day", di);
  tab.innerHTML = `<div>${day.short}</div><div class="tab-dot"></div><div class="tab-pct" id="tabPct${di}">0%</div>`;
  tab.addEventListener("click", () => switchDay(di));
  tabsEl.appendChild(tab);

  // Panel
  const panel = document.createElement("div");
  panel.className = "day-panel" + (di === 0 ? " active" : "");
  panel.id = `panel${di}`;

  panel.innerHTML = `
    <div class="day-header-bar" style="border-top:2px solid ${day.color}">
      <div>
        <div class="day-name" style="color:${day.color}">${day.name}</div>
        <div class="day-sub">${day.sub}</div>
      </div>
      <div class="day-stats">
        <div class="day-pct-big" id="dayPct${di}" style="color:${day.color}">0%</div>
        <div class="day-time">⏱ ${day.time}</div>
      </div>
    </div>
  `;

  day.exercises.forEach((ex, ei) => {
    const card = document.createElement("div");
    card.className = "ex-card";
    card.id = `ex_${di}_${ei}`;

    const tagClass = ex.rir === "easy" ? "tag-rir-easy" : ex.rir === "mid" ? "tag-rir-mid" : "tag-rir-hard";

    card.innerHTML = `
      <div class="ex-main">
        <div class="ex-check" id="check_${di}_${ei}"></div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">
            <span class="tag tag-sets">${ex.sets}</span>
            <span class="tag ${tagClass}">${ex.rirLabel}</span>
          </div>
        </div>
      </div>
      <div class="ex-toggle-tip">${ex.tip}</div>
    `;

    // Tap: toggle done; long press: expand tip
    let pressTimer = null;
    card.addEventListener("touchstart", () => {
      pressTimer = setTimeout(() => {
        pressTimer = null;
        card.classList.toggle("expanded");
      }, 400);
    }, { passive: true });
    card.addEventListener("touchend", () => {
      if (pressTimer !== null) {
        clearTimeout(pressTimer);
        pressTimer = null;
        toggleDone(di, ei);
      }
    });
    card.addEventListener("click", (e) => {
      // fallback for non-touch
      if (!("ontouchstart" in window)) toggleDone(di, ei);
    });

    panel.appendChild(card);
  });

  panelsEl.appendChild(panel);
});

function switchDay(di) {
  document.querySelectorAll(".day-tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".day-panel").forEach(p => p.classList.remove("active"));
  document.querySelector(`.day-tab[data-day="${di}"]`).classList.add("active");
  document.getElementById(`panel${di}`).classList.add("active");
  activeDay = di;
}

function toggleDone(di, ei) {
  state.days[di].done[ei] = !state.days[di].done[ei];
  saveState();
  renderState();
  if (state.days[di].done[ei]) {
    const allDone = state.days[di].done.every(Boolean);
    if (allDone) showToast("Dzień ukończony! 💪");
  }
}

function renderState() {
  DAYS.forEach((day, di) => {
    const doneCnt = state.days[di].done.filter(Boolean).length;
    const total = day.exercises.length;
    const pct = Math.round((doneCnt / total) * 100);

    document.getElementById(`dayPct${di}`).textContent = pct + "%";
    document.getElementById(`tabPct${di}`).textContent = pct + "%";

    day.exercises.forEach((ex, ei) => {
      const card = document.getElementById(`ex_${di}_${ei}`);
      const check = document.getElementById(`check_${di}_${ei}`);
      const done = state.days[di].done[ei];
      card.classList.toggle("done", done);
      check.textContent = done ? "✓" : "";
    });
  });

  const done = totalDone();
  const total = totalEx();
  const pct = Math.round((done / total) * 100);
  document.getElementById("globalPct").textContent = pct + "%";
  document.getElementById("progressFill").style.width = pct + "%";

  const color = pct === 100 ? "#22c55e" : pct > 50 ? "#f59e0b" : "#f0ede8";
  document.getElementById("globalPct").style.color = color;
}

// Reset
function openReset() {
  document.getElementById("overlay").classList.add("show");
}
function closeReset() {
  document.getElementById("overlay").classList.remove("show");
}
function overlayClick(e) {
  if (e.target === document.getElementById("overlay")) closeReset();
}
function doReset() {
  state.days.forEach(d => d.done.fill(false));
  saveState();
  renderState();
  closeReset();
  showToast("Nowy tydzień! 🔥");
}

// Toast
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
}

// Hint: tap to toggle, hold to see tip
setTimeout(() => showToast("Dotknij ćwiczenie = odhaczasz ✓"), 600);

renderState();
</script>
